server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 用 Docker 內建 DNS(127.0.0.11)在「請求當下」才解析 upstream host,
    # 而不是 nginx 啟動當下就解析一次——避免 eshop.application 容器還沒啟動/還沒被
    # DNS 註冊時,nginx 直接啟動失敗(host not found in upstream)整個 crash。
    resolver 127.0.0.11 valid=10s;

    # Vue Router 是 history 模式,直接連深層路徑(如 /orders)要 fallback 回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理後端 API,路徑前綴對齊 vite.config.ts 的 server.proxy 清單
    location ~ ^/(admin|role|product|order|upload|file|images|web|auth)(/|$) {
        set $backend eshop.application;
        proxy_pass http://$backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
